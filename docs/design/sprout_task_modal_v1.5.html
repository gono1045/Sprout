<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Sprout — タスク登録/更新 v1.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>

/* RESET */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
button, input, select, textarea { font-family: inherit; }

/* THEME TOKENS */
:root {
  --font-ui:      'Inter', 'Zen Kaku Gothic New', system-ui, sans-serif;
  --font-display: 'Zen Kaku Gothic New', 'Inter', system-ui, sans-serif;
  --paper:        #F4F1E9;
  --card:         #FFFFFF;
  --card-2:       #FAF7EF;
  --line:         #E6DFCD;
  --line-soft:    #EFE9D7;
  --mist:         #DCEAD6;
  --mist-soft:    #F0F5EB;
  --ink:          #1B2A20;
  --ink-2:        #4A5E4A;
  --ink-3:        #8E9A8E;
  --forest:       #1B4332;
  --moss:         #3E7A52;
  --moss-2:       #5BA178;
  --bark:         #7C6950;
  --amber-fg:     #9A6610;
  --ember:        #C85A28;
  --shadow-sm:    0 1px 3px rgba(60,50,30,.06), 0 4px 12px rgba(60,50,30,.05);
  --shadow-modal: 0 8px 40px rgba(20,40,25,.18), 0 2px 8px rgba(20,40,25,.10);
}

body {
  font-family: var(--font-ui);
  background: var(--paper);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

@keyframes fadeIn  { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
@keyframes scaleIn { from { opacity:0; transform:scale(.96); } to { opacity:1; transform:scale(1); } }

.hdr {
  position: sticky; top: 0; z-index: 50;
  height: 56px; padding: 0 24px;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 16px;
}
.hdr-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.hdr-logo-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, var(--forest), var(--moss));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(45,106,79,.25);
}
.hdr-logo-icon span { color: #fff; font-size: 14px; font-weight: 900; font-family: var(--font-display); }
.hdr-logo-text { font-family: var(--font-display); font-weight: 700; font-size: 17px; letter-spacing: .03em; color: var(--ink); }

.preview-bar {
  background: var(--line-soft);
  border-bottom: 1px solid var(--line);
  padding: 10px 24px;
  display: flex; align-items: center; gap: 8px;
}
.preview-label { font-size: 11.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-3); margin-right: 4px; }
.preview-btn {
  padding: 5px 14px; border-radius: 8px;
  font-size: 12.5px; font-weight: 600;
  border: 1.5px solid var(--line);
  background: var(--card); color: var(--ink-2);
  cursor: pointer;
  transition: background .12s, border-color .12s, color .12s;
}
.preview-btn:hover { background: var(--mist-soft); }
.preview-btn.active { background: var(--forest); border-color: var(--forest); color: #fff; }
.preview-note { margin-left: auto; font-size: 11.5px; color: var(--ink-3); font-style: italic; }

.stage {
  min-height: calc(100vh - 56px - 41px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 24px 60px;
  position: relative;
}
.stage::before {
  content: ''; position: absolute; inset: 0;
  opacity: .3; pointer-events: none;
  background-image: radial-gradient(circle, var(--moss-2) 0.55px, transparent 1px);
  background-size: 28px 28px;
}

.modal {
  position: relative; z-index: 10;
  width: 100%; max-width: 680px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  box-shadow: var(--shadow-modal);
  overflow: hidden;
  animation: scaleIn .3s cubic-bezier(.22,.68,0,1.2);
}

.modal-hdr {
  display: flex; align-items: center;
  padding: 0 24px; height: 60px;
  border-bottom: 1px solid var(--line);
  gap: 12px;
}

.modal-mode-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--mist-soft);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px 10px;
  font-size: 11px; font-weight: 600;
  letter-spacing: .05em; color: var(--ink-3);
  text-transform: uppercase;
}
.modal-mode-badge.mode-new  { background: var(--mist-soft); color: var(--moss-2); border-color: var(--mist); }
.modal-mode-badge.mode-edit { background: #FFF8E6; color: var(--amber-fg); border-color: #F5E3B0; }

.modal-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--ink); letter-spacing: .01em; }

.modal-close {
  margin-left: auto;
  width: 30px; height: 30px; border-radius: 8px;
  background: transparent; border: none;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-3); cursor: pointer;
  transition: background .12s, color .12s;
}
.modal-close:hover { background: var(--mist-soft); color: var(--ink); }

.modal-body { padding: 28px 28px 8px; display: flex; flex-direction: column; gap: 20px; }

.field-row { display: grid; gap: 16px; }
.field-row.cols-2 { grid-template-columns: 1fr 1fr; }
.field-row.cols-1 { grid-template-columns: 1fr; }

.field { display: flex; flex-direction: column; gap: 7px; }

.field-label {
  font-size: 11.5px; font-weight: 600;
  letter-spacing: .055em; text-transform: uppercase;
  color: var(--ink-2);
  display: flex; align-items: center; gap: 6px;
}
.field-label .required { color: var(--ember); font-size: 10px; font-weight: 700; letter-spacing: .04em; }
.field-label .hint { font-size: 11px; font-weight: 400; color: var(--ink-3); text-transform: none; letter-spacing: 0; margin-left: auto; }

.field-input,
.field-select,
.field-textarea {
  display: block; width: 100%;
  background: var(--card-2);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  font-size: 14px; color: var(--ink);
  outline: none;
  transition: border-color .15s, box-shadow .15s, background .12s;
  -webkit-appearance: none;
}
.field-input { height: 44px; padding: 0 14px; }
.field-input::placeholder, .field-textarea::placeholder { color: var(--ink-3); }
.field-input:focus, .field-select:focus, .field-textarea:focus {
  border-color: var(--moss-2);
  box-shadow: 0 0 0 3px rgba(91,161,120,.14);
  background: var(--card);
}
.field-input.readonly { background: var(--line-soft); color: var(--ink-3); cursor: default; }
.field-input.readonly:focus { border-color: var(--line); box-shadow: none; }
.field-input.is-error { border-color: var(--ember); box-shadow: 0 0 0 3px rgba(200,90,40,.10); }
.field-error-msg { font-size: 12px; color: var(--ember); margin-top: -2px; }

.status-group { display: flex; gap: 8px; }

.status-chip {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 10px 8px;
  border-radius: 10px;
  border: 1.5px solid var(--line);
  background: var(--card-2);
  cursor: pointer;
  transition: all .15s;
  position: relative;
}
.status-chip:hover { background: var(--mist-soft); border-color: var(--line); }
.status-chip.st-pending  { color: var(--ink-3); }
.status-chip.st-progress { color: var(--moss-2); }
.status-chip.st-done     { color: var(--forest); }
.status-chip.active.st-pending  { background: var(--line-soft); border-color: var(--ink-3); box-shadow: 0 0 0 2px rgba(142,154,142,.15); }
.status-chip.active.st-progress { background: var(--mist-soft); border-color: var(--moss-2); box-shadow: 0 0 0 2px rgba(91,161,120,.14); }
.status-chip.active.st-done     { background: var(--mist); border-color: var(--moss); box-shadow: 0 0 0 2px rgba(62,122,82,.14); }
.status-chip-label { font-size: 12px; font-weight: 600; letter-spacing: .01em; }
.status-radio { position: absolute; opacity: 0; width: 0; height: 0; }

.priority-group { display: flex; gap: 8px; }
.priority-chip {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 8px; border-radius: 10px;
  border: 1.5px solid var(--line);
  background: var(--card-2);
  cursor: pointer; transition: all .15s;
  font-size: 13px; font-weight: 500;
  position: relative;
}
.priority-chip:hover { background: var(--mist-soft); }
.priority-chip.pr-low    { color: var(--ink-3); }
.priority-chip.pr-mid    { color: var(--amber-fg); }
.priority-chip.pr-high   { color: var(--ember); }
.priority-chip.active.pr-low  { background: var(--line-soft); border-color: var(--ink-3); box-shadow: 0 0 0 2px rgba(142,154,142,.15); }
.priority-chip.active.pr-mid  { background: #FFF8E6; border-color: #D4A040; box-shadow: 0 0 0 2px rgba(154,102,16,.12); }
.priority-chip.active.pr-high { background: #FEF0E6; border-color: var(--ember); box-shadow: 0 0 0 2px rgba(200,90,40,.12); }
.priority-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

.tag-area {
  min-height: 44px; padding: 8px 12px;
  background: var(--card-2);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  cursor: text;
  transition: border-color .15s, box-shadow .15s;
}
.tag-area:focus-within {
  border-color: var(--moss-2);
  box-shadow: 0 0 0 3px rgba(91,161,120,.14);
  background: var(--card);
}
.tag-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 12px; font-weight: 600;
  white-space: nowrap; cursor: default;
}
.tag-chip-remove {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center;
  padding: 0; opacity: .55;
  transition: opacity .12s;
}
.tag-chip-remove:hover { opacity: 1; }
.tag-input {
  flex: 1; min-width: 80px;
  background: transparent; border: none; outline: none;
  font-size: 13px; color: var(--ink); padding: 2px 0;
}
.tag-input::placeholder { color: var(--ink-3); font-size: 12.5px; }
.tag-hint { font-size: 11.5px; color: var(--ink-3); }

.field-date-wrap { position: relative; }
.field-date-wrap .field-input { padding-right: 42px; }
.field-date-icon {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--ink-3); display: flex; align-items: center;
  transition: color .12s; padding: 4px;
}
.field-date-icon:hover { color: var(--moss-2); }

.field-textarea { padding: 12px 14px; min-height: 110px; resize: vertical; line-height: 1.65; }

.modal-ftr {
  padding: 20px 28px;
  border-top: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 4px;
}
.ftr-left { display: flex; align-items: center; gap: 8px; }
.ftr-right { display: flex; align-items: center; gap: 10px; }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 0 18px; height: 40px;
  border-radius: 10px;
  font-size: 13.5px; font-weight: 600; cursor: pointer;
  border: none; letter-spacing: .02em;
  transition: opacity .15s, transform .1s, box-shadow .15s;
}
.btn:active { transform: scale(.98); }
.btn-cancel { background: var(--card-2); border: 1.5px solid var(--line); color: var(--ink-2); }
.btn-cancel:hover { background: var(--line-soft); }
.btn-delete { background: #FEF2F2; border: 1.5px solid #FECACA; color: #B91C1C; }
.btn-delete:hover { background: #FEE2E2; border-color: #FCA5A5; }
.btn-submit { background: linear-gradient(135deg, var(--forest), var(--moss)); color: #fff; box-shadow: 0 2px 10px rgba(27,67,50,.25); }
.btn-submit:hover { opacity: .9; box-shadow: 0 4px 16px rgba(27,67,50,.32); }

.field-err { font-size: 12px; color: var(--ember); display: flex; align-items: center; gap: 4px; animation: fadeIn .2s ease; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

</style>
</head>
<body>

<header class="hdr">
  <a class="hdr-logo" href="#">
    <div class="hdr-logo-icon"><span>S</span></div>
    <span class="hdr-logo-text">Sprout</span>
  </a>
</header>

<div class="preview-bar">
  <span class="preview-label">Preview</span>
  <button class="preview-btn active" onclick="setMode('new')">新規登録</button>
  <button class="preview-btn" onclick="setMode('edit')">更新</button>
  <span class="preview-note">※ デモ用の切り替えバー。実装は Thymeleaf の modalFlg で制御。</span>
</div>

<main class="stage">
  <div class="modal" id="modal">

    <div class="modal-hdr">
      <div class="modal-mode-badge mode-new" id="mode-badge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" id="badge-icon">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span id="badge-text">NEW</span>
      </div>
      <h2 class="modal-title" id="modal-title">新規登録</h2>
      <button class="modal-close" type="button" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <form id="sproutItemListForm" th:action="@{/add}" action="/add" method="post">
      <input type="hidden" name="modalFlg" id="modalFlg" value="0">
      <input type="hidden" name="updateAt" id="updateAt">
      <input type="hidden" name="id" id="taskId">

      <div class="modal-body">

        <div class="field-row cols-1">
          <div class="field">
            <label class="field-label" for="title">
              タイトル
              <span class="required">必須</span>
            </label>
            <input class="field-input" type="text" id="title" name="title"
                   placeholder="タスクのタイトルを入力"
                   required autocomplete="off">
          </div>
        </div>

        <div class="field-row cols-1">
          <div class="field">
            <label class="field-label">
              タグ
              <span class="hint">Enter で追加</span>
            </label>
            <div class="tag-area" id="tag-area" onclick="focusTagInput()">
              <span class="tag-chip" style="background:#E8F5E9; color:#2E7D32;">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="4"/></svg>
                開発
                <button class="tag-chip-remove" type="button" onclick="removeTag(this)">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                  </svg>
                </button>
              </span>
              <input class="tag-input" type="text" id="tag-input"
                     placeholder="タグを入力して Enter …"
                     onkeydown="handleTagInput(event)">
            </div>
            <p class="tag-hint">キーワードやカテゴリをタグで分類できます。</p>
          </div>
        </div>

        <div class="field-row cols-2">
          <div class="field">
            <label class="field-label">ステータス</label>
            <div class="status-group" role="radiogroup" aria-label="ステータス">
              <label class="status-chip st-pending" id="st-1">
                <input class="status-radio" type="radio" name="statusCd" value="1" checked onchange="updateStatus(1)">
                <span class="status-chip-label">未着手</span>
              </label>
              <label class="status-chip st-progress" id="st-2">
                <input class="status-radio" type="radio" name="statusCd" value="2" onchange="updateStatus(2)">
                <span class="status-chip-label">進行中</span>
              </label>
              <label class="status-chip st-done" id="st-3">
                <input class="status-radio" type="radio" name="statusCd" value="3" onchange="updateStatus(3)">
                <span class="status-chip-label">完了</span>
              </label>
            </div>
          </div>
          <div class="field">
            <label class="field-label">優先度</label>
            <div class="priority-group" role="radiogroup" aria-label="優先度">
              <label class="priority-chip pr-low" id="pr-1">
                <input class="status-radio" type="radio" name="priorityCd" value="1" checked onchange="updatePriority(1)">
                <span class="priority-dot"></span>
                低
              </label>
              <label class="priority-chip pr-mid" id="pr-2">
                <input class="status-radio" type="radio" name="priorityCd" value="2" onchange="updatePriority(2)">
                <span class="priority-dot"></span>
                中
              </label>
              <label class="priority-chip pr-high" id="pr-3">
                <input class="status-radio" type="radio" name="priorityCd" value="3" onchange="updatePriority(3)">
                <span class="priority-dot"></span>
                高
              </label>
            </div>
          </div>
        </div>

        <div class="field-row cols-2">
          <div class="field">
            <label class="field-label" for="deadline">
              締切
              <span class="hint">任意</span>
            </label>
            <div class="field-date-wrap">
              <input class="field-input" type="text" id="deadline" name="deadline" placeholder="YYYY/MM/DD">
              <button type="button" class="field-date-icon" aria-label="カレンダーを開く">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="3"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label class="field-label" for="updateAtStr">更新日</label>
            <input class="field-input readonly" type="text" id="updateAtStr" name="updateAtStr" value="2026/05/30" readonly>
          </div>
        </div>

        <div class="field-row cols-1">
          <div class="field">
            <label class="field-label" for="detail">
              詳細
              <span class="hint">任意</span>
            </label>
            <textarea class="field-textarea" id="detail" name="detail"
                      placeholder="作業メモ・参考リンクなど"
                      rows="5"></textarea>
          </div>
        </div>

      </div>

      <div class="modal-ftr">
        <div class="ftr-left">
          <button class="btn btn-cancel" type="button" onclick="closeModal()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            キャンセル
          </button>
        </div>
        <div class="ftr-right">
          <button class="btn btn-delete" type="button" id="deleteBtn" style="display:none" onclick="confirmDelete()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
            削除
          </button>
          <button class="btn btn-submit" type="submit" id="submitBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="submit-icon">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span id="submit-label">登録</span>
          </button>
        </div>
      </div>
    </form>
  </div>
</main>

<script>
function setMode(type) {
  const isEdit = type === 'edit';
  document.getElementById('modalFlg').value = isEdit ? '1' : '0';
  document.querySelectorAll('.preview-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.preview-btn[onclick="setMode('${type}')"]`).classList.add('active');
  const badge = document.getElementById('mode-badge');
  badge.className = 'modal-mode-badge ' + (isEdit ? 'mode-edit' : 'mode-new');
  document.getElementById('badge-text').textContent = isEdit ? 'EDIT' : 'NEW';
  document.getElementById('badge-icon').innerHTML = isEdit
    ? '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>'
    : '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>';
  document.getElementById('modal-title').textContent = isEdit ? '更新' : '新規登録';
  document.getElementById('deleteBtn').style.display = isEdit ? 'inline-flex' : 'none';
  document.getElementById('submit-icon').innerHTML = isEdit
    ? '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v14a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>'
    : '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>';
  document.getElementById('submit-label').textContent = isEdit ? '更新' : '登録';
  if (isEdit) {
    document.getElementById('title').value = 'タスク管理APIの設計書作成';
    document.getElementById('updateAtStr').value = '2026/05/27';
    document.getElementById('deadline').value = '2026/06/10';
    document.getElementById('detail').value = 'OpenAPI 3.0形式でエンドポイント定義を作成する。';
    updateStatus(2); updatePriority(3);
  } else {
    document.getElementById('title').value = '';
    document.getElementById('deadline').value = '';
    document.getElementById('detail').value = '';
    updateStatus(1); updatePriority(1);
  }
  const modal = document.getElementById('modal');
  modal.style.animation = 'none'; void modal.offsetWidth;
  modal.style.animation = 'scaleIn .3s cubic-bezier(.22,.68,0,1.2)';
}

function updateStatus(val) {
  ['st-1','st-2','st-3'].forEach((id, i) => { document.getElementById(id).classList.toggle('active', i + 1 === val); });
  const radio = document.querySelector(`input[name="statusCd"][value="${val}"]`);
  if (radio) radio.checked = true;
}

function updatePriority(val) {
  ['pr-1','pr-2','pr-3'].forEach((id, i) => { document.getElementById(id).classList.toggle('active', i + 1 === val); });
  const radio = document.querySelector(`input[name="priorityCd"][value="${val}"]`);
  if (radio) radio.checked = true;
}

function focusTagInput() { document.getElementById('tag-input').focus(); }

function handleTagInput(e) {
  if (e.key !== 'Enter' && e.key !== ',') return;
  e.preventDefault();
  const input = e.target;
  const val = input.value.trim();
  if (!val) return;
  addTag(val); input.value = '';
}

const TAG_COLORS = [
  { bg: '#E8F5E9', fg: '#2E7D32' },
  { bg: '#FFF3E0', fg: '#E65100' },
  { bg: '#E3F2FD', fg: '#1565C0' },
  { bg: '#F3E5F5', fg: '#6A1B9A' },
  { bg: '#FDE8E0', fg: '#8B3A2E' },
];
let tagCount = 1;

function addTag(text) {
  const c = TAG_COLORS[tagCount % TAG_COLORS.length]; tagCount++;
  const chip = document.createElement('span');
  chip.className = 'tag-chip';
  chip.style.background = c.bg; chip.style.color = c.fg;
  chip.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="4"/></svg>${text}<button class="tag-chip-remove" type="button" onclick="removeTag(this)"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
  const area = document.getElementById('tag-area');
  area.insertBefore(chip, document.getElementById('tag-input'));
}

function removeTag(btn) { btn.closest('.tag-chip').remove(); }

function closeModal() {
  const modal = document.getElementById('modal');
  modal.style.opacity = '0'; modal.style.transform = 'scale(.96)';
  modal.style.transition = 'opacity .2s, transform .2s';
  setTimeout(() => { modal.style.opacity = '1'; modal.style.transform = ''; modal.style.transition = ''; }, 300);
}

function confirmDelete() {
  if (confirm('このタスクを削除しますか？\nこの操作は元に戻せません。')) {
    alert('削除しました（デモ）');
  }
}

updateStatus(1);
updatePriority(1);
</script>
