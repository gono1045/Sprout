<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Sprout — ログイン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>

/* ─── RESET ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
button, input, select, textarea { font-family: inherit; }

/* ─── THEME TOKENS ──────────────────────────────────── */
:root {
  --font-ui:      'Inter', 'Zen Kaku Gothic New', system-ui, sans-serif;
  --font-display: 'Zen Kaku Gothic New', 'Inter', system-ui, sans-serif;
  --paper:        #F4F1E9;
  --card:         #FFFFFF;
  --line:         #E6DFCD;
  --ink:          #1B2A20;
  --ink-2:        #4A5E4A;
  --ink-3:        #8E9A8E;
  --forest:       #1B4332;
  --moss:         #3E7A52;
  --moss-2:       #5BA178;
  --mist:         #DCEAD6;
  --mist-soft:    #F0F5EB;
}

body {
  font-family: var(--font-ui);
  background: var(--paper);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

.login-root {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  position: relative;
}

.login-root::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: .3;
  pointer-events: none;
  background-image: radial-gradient(circle, var(--moss-2) 0.55px, transparent 1px);
  background-size: 28px 28px;
}

.login-root::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--moss-2), var(--forest), transparent);
  opacity: .25;
}

.form-panel {
  position: relative;
  z-index: 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.form-box {
  width: 100%;
  max-width: 400px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 40px 44px;
  box-shadow: 0 4px 24px rgba(30,50,30,.10);
  animation: fadeUp .38s ease;
}

.form-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.form-logo-icon {
  width: 32px; height: 32px; border-radius: 9px;
  background: linear-gradient(135deg, var(--forest), var(--moss));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(45,106,79,.25);
  overflow: hidden;
}
.form-logo-icon .icon-fallback {
  color: #fff; font-size: 14px; font-weight: 900;
  font-family: var(--font-display);
}
.form-logo-text {
  font-family: var(--font-display);
  font-weight: 700; font-size: 18px;
  letter-spacing: .03em; color: var(--ink);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.form-greeting {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
}

.form-sub {
  font-size: 14px;
  color: var(--ink-3);
  line-height: 1.6;
  margin-bottom: 32px;
}

.field-group { margin-bottom: 18px; }

.field-label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: .055em;
  color: var(--ink-2);
  margin-bottom: 7px;
  text-transform: uppercase;
}

.field-input {
  display: block;
  width: 100%;
  height: 44px;
  padding: 0 14px;
  background: var(--card);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  font-size: 14px;
  color: var(--ink);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
}

.field-input::placeholder { color: var(--ink-3); }
.field-input:focus {
  border-color: var(--moss-2);
  box-shadow: 0 0 0 3px rgba(91,161,120,.14);
}

.pw-wrap { position: relative; }

.pw-toggle {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--ink-3); cursor: pointer;
  padding: 4px;
  display: flex; align-items: center;
  transition: color .12s;
}
.pw-toggle:hover { color: var(--ink-2); }

.field-opts {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: -4px;
  margin-bottom: 26px;
}

.field-remember {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; color: var(--ink-2);
  cursor: pointer; user-select: none;
}

.field-forgot {
  font-size: 13px;
  color: var(--moss-2);
  text-decoration: none;
}
.field-forgot:hover { color: var(--moss); text-decoration: underline; }

.btn-submit {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; height: 46px;
  background: linear-gradient(135deg, var(--forest) 0%, var(--moss) 100%);
  color: #fff;
  font-size: 14px; font-weight: 600;
  border: none; border-radius: 10px; cursor: pointer;
  letter-spacing: .03em;
  transition: opacity .15s, box-shadow .15s;
  box-shadow: 0 2px 10px rgba(27,67,50,.28);
}
.btn-submit:hover { opacity: .92; }

.form-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 24px 0;
}
.form-divider-line { flex: 1; height: 1px; background: var(--line); }
.form-divider-text { font-size: 11.5px; color: var(--ink-3); letter-spacing: .06em; }

.form-register { text-align: center; font-size: 13px; color: var(--ink-3); }
.form-register a { color: var(--moss-2); font-weight: 500; text-decoration: none; }
.form-register a:hover { color: var(--moss); text-decoration: underline; }

</style>
</head>
<body>

<div class="login-root">
  <main class="form-panel">
    <div class="form-box">

      <div class="form-logo">
        <div class="form-logo-icon">
          <span class="icon-fallback">S</span>
        </div>
        <span class="form-logo-text">Sprout</span>
      </div>

      <h1 class="form-greeting">おかえりなさい</h1>
      <p class="form-sub">アカウントにサインインして、タスクの続きを始めましょう。</p>

      <form th:action="@{/login}" action="/login" method="post">

        <div class="field-group">
          <label class="field-label" for="username">ログインID / メールアドレス</label>
          <input class="field-input" type="text" id="username" name="username"
                 placeholder="username または email@example.com"
                 required autocomplete="username">
        </div>

        <div class="field-group">
          <label class="field-label" for="password">パスワード</label>
          <div class="pw-wrap">
            <input class="field-input" type="password" id="password" name="password"
                   placeholder="••••••••"
                   required autocomplete="current-password" style="padding-right:44px">
            <button type="button" class="pw-toggle" onclick="togglePassword()" aria-label="パスワードの表示切替">
              <svg id="eye-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="field-opts">
          <label class="field-remember">
            <input type="checkbox" name="remember-me">
            ログイン状態を保持する
          </label>
          <a class="field-forgot" href="#">パスワードを忘れましたか？</a>
        </div>

        <button class="btn-submit" type="submit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          ログイン
        </button>

      </form>

      <div class="form-divider">
        <div class="form-divider-line"></div>
        <span class="form-divider-text">OR</span>
        <div class="form-divider-line"></div>
      </div>

      <p class="form-register">
        アカウントをお持ちでない方は&ensp;
        <a th:href="@{/register}" href="/register">新規登録</a>
      </p>

    </div>
  </main>
</div>

<script>
function togglePassword() {
  const pw  = document.getElementById('password');
  const ico = document.getElementById('eye-icon');
  if (pw.type === 'password') {
    pw.type = 'text';
    ico.innerHTML = `
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>`;
  } else {
    pw.type = 'password';
    ico.innerHTML = `
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>`;
  }
}
</script>

</body>
</html>
