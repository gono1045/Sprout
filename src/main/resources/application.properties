spring.application.name=sprout

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/sprout_db?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Desperado94
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# MyBatis の Mapper XML の場所
mybatis.mapper-locations=classpath*:mappers/**/*.xml

# Model クラスのパッケージ（typeAlias用）
mybatis.type-aliases-package=com.example.sprout.model
mybatis.configuration.map-underscore-to-camel-case=true
