<!-- modal.html -->
<!-- モーダル全体 -->
  <div class="bg-white rounded shadow-lg max-w-4xl w-full dark:bg-gray-800">
    <!-- モーダルヘッダー -->
    <div class="flex justify-between items-center p-6">
      <!-- 画面タイトル -->
      <h2 class="text-2xl text-gray-800 dark:text-gray-100 leading-none" style="font-size: 1.5rem">
        <span th:if="${sproutItemListForm.modalFlg == 0}">新規登録</span>
        <span th:if="${sproutItemListForm.modalFlg == 1}">更新</span>
      </h2>
      <!-- 閉じるボタン -->
      <button
        id="closeModalBtn"
        type="button"
        class="js-modal-close text-3xl leading-none leading-none text-gray-500 hover:text-gray-800 dark:hover:text-gray-200">
        ×
      </button>
    </div>
    <hr class="border-gray-300 dark:border-gray-700" />
    <div class="modal-body pb-6">
      <!-- 予定追加フォーム -->
      <form id="sproutItemListForm" th:action="@{/add}" th:object="${sproutItemListForm}" method="post"
        class="space-y-4 bg-white p-10 rounded shadow dark:bg-gray-800">
        <!-- 隠し項目 -->
        <input type="hidden" th:field="*{modalFlg}">
        <input type="hidden" th:field="*{updateAt}">
        <input type="hidden" th:field="*{id}">
        <!-- タイトル -->
        <div class="flex items-center gap-2">
          <label for="title" class="whitespace-nowrap text-right w-20 block flex items-center h-full font-medium">タイトル：</label>
          <input type="text" th:field="*{title}" autocomplete="off" required
          class="flex-1 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 dark:bg-gray-900 dark:border-gray-600 dark:text-gray-200" />
          <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}"
            class="text-red-600 text-sm mt-1 dark:text-red-400"></div>
        </div>
        <!-- タグ -->
        <div class="flex items-center gap-2">
          <!-- 後で実装予定 -->
        </div>
        <!-- ステータス -->
        <div class="flex items-center gap-2">
          <label class="whitespace-nowrap w-20 block text-sm font-medium">ステータス：</label>
          <select th:field="*{statusCd}"
            class="flex-1 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 dark:bg-gray-900 dark:border-gray-600 dark:text-gray-200">
            <option value="1">未着手</option>
            <option value="2">進行中</option>
            <option value="3">完了</option>
          </select>
        </div>
        <!-- 優先度 -->
        <div class="flex items-center gap-2">
          <label class="whitespace-nowrap w-20 block text-sm font-medium">優先度：</label>
          <select th:field="*{priorityCd}"
            class="flex-1 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 dark:bg-gray-900 dark:border-gray-600 dark:text-gray-200">
            <option value="1">低</option>
            <option value="2">中</option>
            <option value="3">高</option>
          </select>
        </div>
        <!-- 作成・更新日 -->
        <div class="flex items-center gap-2">
          <label for="updateAt" class="whitespace-nowrap text-right w-20 block flex items-center h-full font-medium">更新日：</label>
          <div class="relative flex-1">
            <input type="text" th:field="*{updateAtStr}"
              class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400
                dark:bg-gray-900 dark:border-gray-600 dark:text-gray-200" readonly/>
          </div>
        </div>
        <!-- 締切 -->
        <div class="flex items-center gap-2">
          <label for="deadline" class="whitespace-nowrap w-20 text-right block flex items-center h-full font-medium">締切：</label>
          <div class="relative flex-1">
            <input  type="text" th:field="*{deadline}"
              class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 dark:bg-gray-900 dark:border-gray-600 dark:text-gray-200" />
            <!-- カレンダーアイコン -->
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer hover:text-blue-600" id="deadlineIcon">
              <!-- Heroicons -->
              <svg xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                class="w-5 h-5">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M8 7V3m8 4V3m-9 8h10m-11 8h12a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </button>
          </div>
          <div th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}"
            class="text-red-600 text-sm mt-1 dark:text-red-400"></div>
        </div>
        <!-- 詳細 -->
        <div class="flex items-start gap-2">
          <label for="detail" class="whitespace-nowrap text-right w-20 block flex items-start font-medium">詳細：</label>
          <textarea th:field="*{detail}" autocomplete="off"
            class="h-40 resize-y flex-1 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 dark:bg-gray-900 dark:border-gray-600 dark:text-gray-200" ></textarea>
          <div th:if="${#fields.hasErrors('detail')}" th:errors="*{detail}"
            class="text-red-600 text-sm mt-1 dark:text-red-400"></div>
        </div>
      </form>
    </div>
    <!-- モーダルフッター -->
    <hr class="border-gray-300 dark:border-gray-700" />
    <div class="p-6 flex justify-between">
      <!-- キャンセル -->
      <button type="button" id="cancelBtn"
        class="js-modal-close bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-400">
        キャンセル
      </button>
      <!-- フッター右側ボタングループ -->
      <div class="flex">
        <!-- 削除（更新時のみ） -->
        <button
          th:if="${sproutItemListForm.modalFlg == 1}"
          type="button"
          id="deleteBtn"
          class="bg-red-600 text-white px-4 py-2 rounded
                 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-400">
          削除
        </button>
        <!-- スペーサー -->
        <span
          th:if="${sproutItemListForm.modalFlg == 1}"
          style="width: 16px; display: inline-block;">
        </span>
        <!-- 追加 -->
        <button
          th:if="${sproutItemListForm.modalFlg == 0}"
          type="submit"
          id="submitBtn"
          class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-400">
          追加
        </button>
        <!-- 更新 -->
        <button
          th:if="${sproutItemListForm.modalFlg == 1}"
          type="submit"
          id="submitBtn"
          class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400">
          更新
        </button>
      </div>
    </div>
  </div>
<!-- モーダルここまで -->
