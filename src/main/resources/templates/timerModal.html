<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="modal">
<style>
/* ===== Timer Modal Design ===== */
.timer-root {
  --font-ui: 'Inter', system-ui, sans-serif;
  --card:    #FFFFFF;
  --card-2:  #FAF7EF;
  --line:    #E6DFCD;
  --ink:     #1B2A20;
  --ink-2:   #4A5E4A;
  --ink-3:   #8E9A8E;
  --forest:  #1B4332;
  --moss:    #3E7A52;
  --moss-2:  #5BA178;
  --ember:   #C85A28;
  --shadow:  0 8px 40px rgba(20,40,25,.18), 0 2px 8px rgba(20,40,25,.10);
}
html.dark .timer-root {
  --card:   #232B25;
  --card-2: #1E2620;
  --line:   #2E3B30;
  --ink:    #E8EDE9;
  --ink-2:  #A8BCA9;
  --ink-3:  #5E7160;
  --forest: #3E9E68;
  --moss:   #5BA178;
  --moss-2: #7DC09A;
  --shadow: 0 8px 40px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.30);
}

.timer-root {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  box-shadow: var(--shadow);
  width: 400px;
  max-width: calc(100vw - 32px);
  font-family: var(--font-ui);
  color: var(--ink);
  overflow: hidden;
}

/* ===== Unified gradient header ===== */
.timer-hdr {
  background: linear-gradient(160deg, #091a0f 0%, #1B4332 55%, #2d6647 100%);
  padding: 18px 20px 20px;
  position: relative;
  overflow: hidden;
}
.timer-hdr::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 75% 25%, rgba(110,231,168,.14) 0%, transparent 60%);
  pointer-events: none;
}
.timer-hdr-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.timer-hdr-icon {
  display: flex; align-items: center;
  color: rgba(167,243,200,.75);
}
.timer-hdr-label {
  font-size: 10px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: rgba(167,243,200,.6);
  flex: 1;
}
.timer-close {
  width: 28px; height: 28px; border-radius: 8px;
  background: rgba(255,255,255,.08); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,.55); transition: background .12s, color .12s;
  flex-shrink: 0;
}
.timer-close:hover { background: rgba(255,255,255,.16); color: #fff; }
.timer-hdr-task {
  font-size: 15px; font-weight: 700; color: #fff;
  line-height: 1.45; word-break: break-word;
  padding-right: 4px;
}

/* ===== Body ===== */
.timer-body {
  padding: 22px 22px 20px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
}

/* Clock display */
.timer-clock {
  font-size: 54px; font-weight: 700; letter-spacing: .03em;
  color: var(--forest); font-variant-numeric: tabular-nums;
  line-height: 1;
}
.timer-clock.is-running { color: var(--moss); }
.timer-clock.is-paused  { color: var(--ink-3); }

/* Status label */
.timer-status-label {
  font-size: 11px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink-3);
  height: 18px;
}

/* Controls */
.timer-controls { display: flex; gap: 10px; justify-content: center; }
.timer-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 22px; border-radius: 10px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background .15s, transform .1s;
}
.timer-btn:active { transform: scale(.97); }
.timer-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

.timer-btn--start   { background: var(--moss); color: #fff; }
.timer-btn--start:hover:not(:disabled)   { background: var(--forest); }
.timer-btn--pause   { background: rgba(142,154,142,.18); color: var(--ink-2); border: 1.5px solid var(--line); }
.timer-btn--pause:hover:not(:disabled)   { background: rgba(142,154,142,.28); }
.timer-btn--resume  { background: var(--moss); color: #fff; }
.timer-btn--resume:hover:not(:disabled)  { background: var(--forest); }
.timer-btn--finish  { background: var(--forest); color: #fff; }
.timer-btn--finish:hover:not(:disabled)  { background: #0f2d1e; }

/* ===== Complete form ===== */
.timer-complete-form { width: 100%; display: flex; flex-direction: column; gap: 14px; }
.timer-field-label {
  font-size: 11px; font-weight: 600; letter-spacing: .055em;
  text-transform: uppercase; color: var(--ink-2);
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
}
.timer-stars { display: flex; gap: 6px; justify-content: center; }
.timer-star {
  font-size: 26px; cursor: pointer; color: var(--line);
  transition: color .1s, transform .1s; user-select: none;
  line-height: 1;
}
.timer-star.active { color: #F59E0B; }
.timer-star:hover  { transform: scale(1.15); }

.timer-memo {
  width: 100%; background: var(--card-2);
  border: 1.5px solid var(--line); border-radius: 10px;
  font-size: 13px; color: var(--ink); outline: none;
  padding: 10px 12px; resize: vertical; min-height: 72px; line-height: 1.6;
  font-family: var(--font-ui); box-sizing: border-box;
  transition: border-color .15s;
}
.timer-memo::placeholder { color: var(--ink-3); }
.timer-memo:focus { border-color: var(--moss-2); box-shadow: 0 0 0 3px rgba(91,161,120,.12); }

/* Summary row */
.timer-summary {
  background: var(--card-2); border-radius: 10px; border: 1px solid var(--line);
  padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
  font-size: 12px; color: var(--ink-2); width: 100%;
}
.timer-summary strong { color: var(--forest); font-weight: 700; font-size: 13px; }

.timer-btn--register {
  width: 100%; background: linear-gradient(135deg, var(--forest), var(--moss));
  color: #fff; border-radius: 10px; font-size: 14px; font-weight: 700;
  padding: 13px; justify-content: center;
}
.timer-btn--register:hover:not(:disabled) { filter: brightness(1.08); }

/* ===== Result phase ===== */
.timer-result-exp-card {
  width: 100%;
  background: linear-gradient(135deg, rgba(27,67,50,.08) 0%, rgba(62,122,82,.06) 100%);
  border: 1.5px solid rgba(62,122,82,.25);
  border-radius: 14px; padding: 22px 20px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  position: relative; overflow: hidden;
}
.timer-result-exp-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 60% 30%, rgba(110,231,168,.1) 0%, transparent 65%);
  pointer-events: none;
}
html.dark .timer-result-exp-card {
  background: linear-gradient(135deg, rgba(62,158,104,.12) 0%, rgba(91,161,120,.08) 100%);
  border-color: rgba(91,161,120,.3);
}
.timer-result-exp-icon {
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, var(--forest), var(--moss));
  color: #a7f3c8; margin-bottom: 4px;
}
.timer-result-exp-label {
  font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--moss); opacity: .8;
}
.timer-result-exp-value {
  font-size: 52px; font-weight: 800; letter-spacing: -.02em;
  color: var(--forest); line-height: 1;
  animation: expPop .5s cubic-bezier(.34,1.56,.64,1) both .1s;
}
html.dark .timer-result-exp-value { color: var(--moss-2); }
.timer-result-exp-value span { font-size: 20px; font-weight: 600; opacity: .65; }
@keyframes expPop {
  from { transform: scale(.5); opacity: 0; }
  to   { transform: scale(1);  opacity: 1; }
}
.timer-result-msg {
  font-size: 12px; color: var(--ink-2); font-weight: 500;
  margin-top: 2px; text-align: center; line-height: 1.5;
}

/* Tag breakdown */
.timer-result-tags {
  width: 100%; display: flex; flex-direction: column; gap: 8px;
}
.timer-result-tag-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--card-2); border: 1px solid var(--line);
  border-radius: 10px; padding: 10px 14px;
  animation: fadeSlideUp .3s ease both;
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.timer-result-tag-chip {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 999px; font-size: 11px;
  font-weight: 600; color: #fff; flex-shrink: 0;
}
.timer-result-tag-lv {
  font-size: 11px; font-weight: 700; color: var(--forest);
  background: rgba(62,122,82,.12); border-radius: 999px;
  padding: 2px 8px; flex-shrink: 0;
}
.timer-result-tag-exp-bar-wrap {
  flex: 1; height: 5px; background: var(--line); border-radius: 999px; overflow: hidden;
}
.timer-result-tag-exp-bar {
  height: 100%; background: linear-gradient(90deg, var(--moss), var(--moss-2));
  border-radius: 999px; transition: width 1.1s cubic-bezier(.4,0,.2,1);
}
.timer-result-lvup {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 700; letter-spacing: .04em;
  color: #92400e; background: #FEF3C7; border-radius: 999px;
  padding: 2px 7px; flex-shrink: 0;
  animation: lvupBadge .4s cubic-bezier(.34,1.56,.64,1) both .3s;
}
html.dark .timer-result-lvup { color: #FEF3C7; background: rgba(245,158,11,.25); }
@keyframes lvupBadge {
  from { transform: scale(0) rotate(-12deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg);  opacity: 1; }
}

.timer-btn--done {
  width: 100%; background: linear-gradient(135deg, var(--forest), var(--moss));
  color: #fff; border-radius: 10px; font-size: 14px; font-weight: 700;
  padding: 13px; justify-content: center; margin-top: 2px;
  border: none;
}
.timer-btn--done:hover { filter: brightness(1.08); }
</style>

<div class="timer-root" id="timerModalRoot">

  <!-- Unified gradient header (task title integrated) -->
  <div class="timer-hdr">
    <div class="timer-hdr-top">
      <span class="timer-hdr-icon"><i data-lucide="timer" style="width:16px;height:16px;"></i></span>
      <span class="timer-hdr-label">工数計測</span>
      <button class="timer-close js-timer-close" id="timerCloseBtn" title="閉じる">
        <i data-lucide="x" style="width:15px;height:15px;"></i>
      </button>
    </div>
    <div class="timer-hdr-task" id="timerTaskName" th:text="${itemTitle}">タスク名</div>
  </div>

  <!-- Body -->
  <div class="timer-body">

    <!-- フェーズ: 計測 -->
    <div id="timerPhaseTimer" style="display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;">
      <div class="timer-clock" id="timerDisplay">00:00:00</div>
      <div class="timer-status-label" id="timerStatusLabel">準備中</div>
      <div class="timer-controls">
        <button class="timer-btn timer-btn--start"  id="timerBtnStart"><i data-lucide="play"  style="width:14px;height:14px;"></i> スタート</button>
        <button class="timer-btn timer-btn--pause"  id="timerBtnPause"  style="display:none;"><i data-lucide="pause"  style="width:14px;height:14px;"></i> 一時停止</button>
        <button class="timer-btn timer-btn--resume" id="timerBtnResume" style="display:none;"><i data-lucide="play"   style="width:14px;height:14px;"></i> 再開</button>
        <button class="timer-btn timer-btn--finish" id="timerBtnFinish" style="display:none;"><i data-lucide="square-check" style="width:14px;height:14px;"></i> 完了</button>
      </div>
    </div>

    <!-- フェーズ: 記録入力 -->
    <div id="timerPhaseComplete" style="display:none;width:100%;">
      <div class="timer-complete-form">

        <!-- サマリー -->
        <div class="timer-summary">
          <span>計測時間</span>
          <strong id="timerSummaryDuration">--</strong>
        </div>

        <!-- 達成感 -->
        <div>
          <div class="timer-field-label">達成感</div>
          <div class="timer-stars" id="timerStars">
            <span class="timer-star" data-star="1">★</span>
            <span class="timer-star" data-star="2">★</span>
            <span class="timer-star" data-star="3">★</span>
            <span class="timer-star" data-star="4">★</span>
            <span class="timer-star" data-star="5">★</span>
          </div>
        </div>

        <!-- 気づきメモ -->
        <div>
          <div class="timer-field-label">
            気づきメモ
            <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink-3);">（任意）</span>
          </div>
          <textarea class="timer-memo" id="timerMemo" placeholder="今回の作業で気づいたことや学んだことを残しておきましょう"></textarea>
        </div>

        <!-- 登録ボタン -->
        <button class="timer-btn timer-btn--register" id="timerBtnRegister" disabled>
          <i data-lucide="check" style="width:15px;height:15px;"></i>&nbsp; 記録する
        </button>
      </div>
    </div>

    <!-- フェーズ: 結果 -->
    <div id="timerPhaseResult" style="display:none;width:100%;">

      <!-- EXP 獲得カード -->
      <div class="timer-result-exp-card">
        <div class="timer-result-exp-icon">
          <i data-lucide="sprout" style="width:22px;height:22px;"></i>
        </div>
        <div class="timer-result-exp-label">EXP 獲得</div>
        <div class="timer-result-exp-value" id="timerResultExp">0 <span>EXP</span></div>
        <div class="timer-result-msg" id="timerResultMsg">お疲れさまでした！</div>
      </div>

      <!-- タグ別 EXP 内訳 -->
      <div class="timer-result-tags" id="timerResultTags" style="margin-top:14px;"></div>

      <!-- 閉じるボタン -->
      <button class="timer-btn timer-btn--done" id="timerBtnDone" style="margin-top:16px;">
        <i data-lucide="leaf" style="width:14px;height:14px;"></i>&nbsp; ガーデンを確認する
      </button>

    </div>

  </div><!-- /.timer-body -->
</div>

<!-- hidden: itemId -->
<input type="hidden" id="timerItemId" th:value="${itemId}">

<!-- 初期化は sproutTop.js の callBack から timerModal.init($modalEl) で行う -->
</th:block>

</body>
</html>
