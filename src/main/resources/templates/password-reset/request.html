<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <title>パスワードリセット — Sprout</title>
  <link rel="stylesheet" th:href="@{/css/output.css}">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #1B4332; --moss: #3E7A52; --moss-2: #5BA178;
      --paper: #F4F1E9; --line: #E6DFCD;
      --ink: #1B2A20; --ink-2: #4A5E4A; --ink-3: #8E9A8E; --card: #FFFFFF; --ember: #C85A28;
    }
    body {
      background-color: var(--paper); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(circle, var(--line) 1px, transparent 1px);
      background-size: 24px 24px; pointer-events: none; z-index: 0;
    }
    .card {
      position: relative; z-index: 1; width: 100%; max-width: 400px;
      background: var(--card); border: 1px solid var(--line); border-radius: 16px;
      padding: 40px; box-shadow: 0 2px 16px rgba(27,67,50,.08);
    }
    .logo { font-family: 'Merriweather', serif; font-size: 28px; font-weight: 700; color: var(--forest); display: block; margin-bottom: 8px; text-align: center; }
    .page-title { font-size: 15px; font-weight: 600; color: var(--ink-2); margin-bottom: 24px; text-align: center; }
    .desc { font-size: 13px; color: var(--ink-3); line-height: 1.7; margin-bottom: 24px; }
    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 20px; }
    .field-label { font-size: 11.5px; font-weight: 600; letter-spacing: .055em; text-transform: uppercase; color: var(--ink-2); }
    .field-input {
      height: 44px; padding: 0 14px; border: 1.5px solid var(--line); border-radius: 10px;
      background: #FAF7EF; color: var(--ink); font-size: 14px; outline: none;
      transition: border-color .15s, box-shadow .15s; box-sizing: border-box; width: 100%;
    }
    .field-input:focus { border-color: var(--moss-2); box-shadow: 0 0 0 3px rgba(91,161,120,.14); background: var(--card); }
    .field-error { font-size: 12px; color: var(--ember); }
    .btn-primary {
      display: flex; align-items: center; justify-content: center; width: 100%; height: 48px;
      background: linear-gradient(135deg, var(--forest), var(--moss)); color: #fff;
      font-size: 14px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer;
      box-shadow: 0 2px 10px rgba(27,67,50,.25); transition: opacity .15s; margin-top: 4px;
    }
    .btn-primary:hover { opacity: .9; }
    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: var(--moss); text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <span class="logo">Sprout</span>
    <p class="page-title">パスワードリセット</p>
    <p class="desc">
      登録済みのメールアドレスを入力してください。<br>
      パスワードをリセットするためのリンクをお送りします。
    </p>
    <form th:action="@{/password-reset/request}" th:object="${resetRequestForm}" method="post">
      <div class="field">
        <label class="field-label" for="email">メールアドレス</label>
        <input type="email" id="email" th:field="*{email}" class="field-input"
               autocomplete="email" placeholder="example@example.com"/>
        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></div>
      </div>
      <button type="submit" class="btn-primary">リセットメールを送信</button>
    </form>
    <a th:href="@{/login}" class="back-link">← ログイン画面に戻る</a>
  </div>
</body>
</html>
