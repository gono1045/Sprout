<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja" class="text-[80%]">
  <head>
    <meta charset="UTF-8" />
    <title>予定一覧</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Merienda&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <!-- flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <!-- Tailwind -->
    <link rel="stylesheet" th:href="@{/css/output.css}">
    <!-- favicon -->
    <link rel="icon" type="image/png" th:href="@{/img/favicon.ico}">
    <!-- icon -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Day.js -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <!-- flatpickr -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
    <!-- 自作JS -->
    <script th:src="@{/js/sprout-util.js}"></script>
    <script th:src="@{/js/sprout-message.js}"></script>
    <script th:src="@{/js/sprout-tags.js}"></script>
    <script th:src="@{/js/itemUpdateModal.js}"></script>
    <script th:src="@{/js/sproutTop.js}"></script>
  </head>
<body class="font-body min-h-screen"
      style="background-color: var(--paper); color: var(--text-primary);">
  <div id="sproutTopRoot">
    <!-- ヘッダー -->
    <header class="header sticky top-0 z-50  h-20 border-b bg-[var(--paper)]">
        <div class="header-inner h-full max-w-12xl mx-auto px-8 flex items-center justify-between">
            <a class="text-4xl font-bold sprout-logo-text" style="font-family: 'Merriweather', serif;" href="/">Sprout</a>
            <nav class="header-nav items-center gap-3 flex">
                <!-- ダークモード切替ボタン -->
                <button class="btn-icon p-1 cursor-pointer" id="themeToggle" type="button" aria-label="テーマ切替"></button>
                <div class="avatar-wrap relative">
                    <!-- ユーザーボタン -->
                    <button id="userMenuButton" class="avatar w-9 h-9 rounded-full bg-green-700 text-white font-bold 
                        flex items-center justify-center cursor-pointer"
                        th:text="${#strings.substring(loginId, 0, 1)}">U</button>
                     <!-- ドロップダウン -->
                     <div id="userMenuDropdown" class="header-dropdown hidden absolute right-0 top-11 min-w-[140px]
                        rounded-lg shadow-lg py-2 bg-white">
                        <span class="dropdown-username block px-4 py-2 text-xs text-gray-600" th:text="${loginId}">user</span>
                        <form th:action="@{/logout}" method="post">
                          <button type="submit" class="dropdown-item block w-full text-left px-4 py-2 hover:bg-gray-100 text-gray-700">ログアウト</button>
                        </form>
                     </div>
                </div>
            </nav>
        </div>
    </header>
    <main class="px-8 py-6">
        <!-- Heroセクション（v1.5レイアウト） -->
        <section class="mb-4 rounded-2xl overflow-hidden border border-gray-200 dark:border-gray-700 shadow-sm"
                 style="background: linear-gradient(180deg, #f8f5ec 0%, #eef2e8 65%, #e4ecdf 100%);">
          <div class="grid min-h-[210px]" style="grid-template-columns: 380px 1fr;">

            <!-- Featured（左） -->
            <div class="flex items-center gap-5 px-6 py-5 border-r border-dashed border-gray-300 dark:border-gray-600 relative">
              <!-- 選択解除ボタン -->
              <button id="sproutTopFeatClear"
                class="hidden absolute top-2.5 right-3 text-xs px-2.5 py-1 rounded-md
                       border border-gray-300 hover:bg-gray-100
                       dark:border-gray-600 dark:hover:bg-gray-700 text-gray-600">
                ✕ 選択解除
              </button>

              <!-- Ring + Image（重ね合わせ） -->
              <div class="relative flex-none flex items-center justify-center"
                   style="width:152px; height:152px;">
                <svg id="sproutTopHeroArc" class="absolute inset-0" style="transform:rotate(-90deg);"
                     width="152" height="152" viewBox="0 0 152 152">
                  <circle cx="76" cy="76" r="68" fill="none" stroke="#e5e7eb" stroke-width="2.5"/>
                  <circle id="sproutTopArcRing" cx="76" cy="76" r="68" fill="none"
                    stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"
                    stroke-dasharray="427.3" stroke-dashoffset="427.3"
                    class="transition-all duration-700"/>
                </svg>
                <img id="sproutTopFeatImg" th:src="@{/img/plant_default.png}" alt="plant"
                  class="object-contain relative z-10" style="width:110px; height:110px;">
              </div>

              <!-- Info -->
              <div class="flex-1 min-w-0">
                <div class="hero-label mb-1">FEATURED タグ</div>
                <p id="sproutTopFeatName"
                   class="font-bold text-base text-emerald-700 mb-0.5 truncate">タグを選択してください</p>
                <p id="sproutTopFeatStage"
                   class="text-sm font-semibold text-green-600 mb-2">---</p>
                <div class="flex justify-between text-xs text-theme-secondary mb-1">
                  <span>EXP</span>
                  <span id="sproutTopFeatExp">— / —</span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden" style="height:6px;">
                  <div id="sproutTopFeatBar"
                       class="h-full bg-green-400 rounded-full transition-all duration-700"
                       style="width:0%"></div>
                </div>
              </div>
            </div>

            <!-- Grove（右） -->
            <div class="flex flex-col p-4">
              <div class="hero-label mb-2.5">マイガーデン</div>
              <ul id="sproutTopGroveList"
                  class="flex gap-2.5 overflow-x-auto pb-1 flex-1 items-start"
                  style="scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;">
                <!-- JS で動的生成 -->
              </ul>
            </div>

          </div>
        </section>
        <!-- ツールバー -->
        <div class="flex flex-wrap items-center gap-2 mb-2">
          <!-- 新規ボタン -->
          <button id="createTaskModalButton" type="button"
            class="px-4 py-1.5 bg-emerald-600 text-white text-sm font-semibold
                   rounded-full hover:bg-emerald-500 active:scale-95 transition shadow-sm">
            ＋ 新規
          </button>
          <!-- 完了済み表示切替 -->
          <button id="toggleCompletedBtn" type="button"
            class="px-4 py-1.5 bg-white/80 dark:bg-gray-700 text-gray-600 dark:text-gray-300
                   text-sm rounded-full border border-gray-300 dark:border-gray-600
                   hover:bg-gray-50 dark:hover:bg-gray-600 active:scale-95 transition shadow-sm">
            完了済みを表示
          </button>
          <!-- インライン検索 -->
          <div class="relative ml-auto flex items-center">
            <span class="absolute left-3 text-gray-400 pointer-events-none flex items-center">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="6"/><line x1="20" y1="20" x2="16" y2="16"/>
              </svg>
            </span>
            <input id="taskSearchInput" type="text" placeholder="検索" autocomplete="off"
              class="pl-8 pr-4 py-1.5 w-72 text-sm bg-white/80 dark:bg-gray-700 border border-gray-300
                  dark:border-gray-600 rounded-full focus:outline-none focus:ring-2 focus:ring-emerald-400
                  dark:text-gray-200 transition" />
          </div>
        </div>
        <!-- 予定一覧テーブル -->
        <div>
          <div class="overflow-x-auto overflow-y-auto min-h-[20rem]">
            <div id="sproutTable"
                 class="min-w-full bg-white/80 dark:bg-gray-800/80 rounded-lg shadow overflow-hidden">
              <!-- ヘッダー -->
              <div class="tbl-row text-sm font-semibold text-sprout-content
                          bg-gray-50 dark:bg-gray-700/50 border-b border-gray-200 dark:border-gray-700">
                <div class="tbl-cell"></div>
                <div class="tbl-cell">タイトル</div>
                <div class="tbl-cell" style="padding-left: 1.25rem;">タグ</div>
                <div class="tbl-cell">ステータス</div>
                <div class="tbl-cell">締切</div>
                <div class="tbl-cell">優先度</div>
                <div class="tbl-cell">工数</div>
                <div class="tbl-cell"></div>
              </div>
              <div id="sproutTableBody"></div>
            </div>
          </div>
        </div>
    </main>
  </div>
</body>
</html>
