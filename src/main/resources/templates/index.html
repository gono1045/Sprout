<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja" class="">

<head>
  <meta charset="UTF-8" />
  <title>予定一覧</title>
  <link href="https://fonts.googleapis.com/css2?family=Merienda&display=swap" rel="stylesheet">
  <!-- flatpickr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <!-- flatpickr JS -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <!-- 日本語ローカライズ -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
  <link rel="stylesheet" th:href="@{/css/output.css}">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-jeditable.js/2.0.15/jquery.jeditable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.16.0/Sortable.min.js"></script>
  <script th:src="@{/js/script.js}"></script>
  <link rel="icon" type="image/png" th:href="@{/img/favicon.ico}">
</head>

<body class="font-body min-h-screen p-10 dark:bg-gray-900 dark:text-blue-300"
      th:style="|background-image: url('@{/img/IMG_1152.JPG}'); background-size: cover; background-position: center; background-repeat: no-repeat;|">

  <!-- タイトル -->
  <h1 class="mx-auto w-64">
    <img th:src="@{/img/sprout-logo.png}" alt="Sprout" class="w-full h-auto">
  </h1>

    <div th:replace="modal :: sproutModal(@{/add}, ${sproutForm})"></div>
  <!-- メイン画面 -->
  <div class="flex items-center justify-between mb-3">

    <form method="get" action="/" class="flex mb-2">
      <!-- 新規登録ボタン-->
      <button id="openNewModalBtn" type="button"
        class="mr-2 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
        新規
      </button>
      <!-- 完了済み表示切替ボタン -->
      <input type="hidden" name="showCompleted" th:value="${!showCompleted}" />
      <button type="submit" th:text="${showCompleted} ? '完了済みを隠す' : '完了済みを表示'"
        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-400 dark:bg-blue-500 dark:hover:bg-blue-300 dark:focus:ring-blue-300">
      </button>
    </form>
    <!-- 検索フォーム -->
    <form method="get" th:action="@{/}" class="mb-2 flex gap-2 max-w-3xl">
      <input type="text" name="keyword" th:value="${keyword}" placeholder="内容で検索" autocomplete="off"
        class="w-80 flex-grow px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 dark:bg-gray-800 dark:border-gray-600 dark:placeholder-gray-400 dark:text-gray-200" />
      <input type="hidden" name="showCompleted" th:value="${showCompleted}" />
      <button type="submit"
        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-400 dark:bg-blue-500 dark:hover:bg-blue-300 dark:focus:ring-blue-300">
        検索
      </button>
      <select name="tag" class="border border-gray-300 rounded px-2 py-1">
              <option value="">全てのタグ</option>
              <option th:each="tag : ${tagCandidates}" th:value="${tag}" th:text="${tag}"
                  th:selected="${tag == selectedTag}"></option>
      </select>
      <button type="submit" class="bg-blue-500 text-white px-3 py-1 rounded">絞り込み</button>
    </form>
  </div>

  <!-- 予定一覧テーブル -->
  <div class="overflow-x-auto">
    <table class="table-fixed  border-collapse text-center min-w-full border border-blue-300 bg-white shadow rounded-lg dark:bg-gray-800">
      <thead class="bg-gray-100 border-b border-blue-300 dark:bg-gray-700 dark:border-gray-600">
        <tr>
          <th class="w-80 border-r py-3 px-4 text-center text-gray-600 border-b border-blue-300 dark:text-gray-300">タイトル</th>
          <th class="border-r py-3 px-4 text-center text-gray-600 border-b border-blue-300 dark:text-gray-300">タグ</th>
          <th class="border-r py-3 px-4 text-center text-gray-600 border-b border-blue-300 dark:text-gray-300">ステータス</th>
          <th class="border-r py-3 px-4 text-center text-gray-600 border-b border-blue-300 dark:text-gray-300">優先度</th>
          <th class="border-r py-3 px-4 text-center text-gray-600 border-b border-blue-300 dark:text-gray-300">
            <a th:href="@{/?sort=createdAt&dir=__${dir == 'asc' and sort == 'date' ? 'desc' : 'asc'}__}"
              class="hover:underline text-gray-700 dark:text-gray-200 flex items-center justify-center gap-1"
              style="text-decoration:none;">
              作成日
              <span th:if="${sort == 'date'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
            </a>
          </th>
          <th class="border-r py-3 px-4 text-center text-gray-600 border-b border-blue-300 dark:text-gray-300">締切</th>
          <th class="w-80 border-r py-3 px-4 text-center text-gray-600 border-b border-blue-300 dark:text-gray-300">詳細</th>
          <th class="border-r py-3 px-4 text-center text-gray-600 border-b border-blue-300 dark:text-gray-300">削除</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(sprouts)}">
          <td colspan="9" class="border-r border-b border-blue-300 text-center py-4 text-gray-500 italic dark:text-gray-400">予定が登録されていません</td>
        </tr>
        <tr th:each="item : ${sprouts}"
          class="border-r border-b border-blue-300 hover:bg-gray-50 dark:border-gray-700 dark:hover:bg-gray-700"
          th:classappend="${item.done} ? 'opacity-50 line-through' : ''"
          th:attr="data-id=${item.id}">

          <!-- タイトル -->
          <td class="editable w-80 border-r border-b border-blue-300 py-2 px-4 relative" data-field="title">
            <div class="cell-wrapper flex items-center justify-center">
                <!-- 表示用span -->
                <span th:text="${item.title}" class="cell-text title flex-1 text-center overflow-hidden whitespace-nowrap text-ellipsis"></span>
                <!-- 編集用input -->
                <input type="text" name="title" class="hidden-input absolute inset-0 w-full h-full px-2 text-center border rounded hidden">
                <!-- アイコン -->
                <button type="button" class="openEditModalBtn absolute right-2 shrink-0"
                        th:data-id="${item.id}"
                        th:data-title="${item.title}"
                        th:data-tag="${item.tag}"
                        th:data-status="${item.status}"
                        th:data-priority="${item.priority}"
                        th:data-createdat="${#temporals.format(item.createdAt, 'yyy-MM-dd')}"
                        th:data-deadline="${item.deadline != null ? #temporals.format(item.deadline, 'yyy-MM-dd') : ''}"
                        th:data-detail="${item.detail}">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                       stroke="currentColor" class="w-5 h-5 text-gray-600 dark:text-blue-300 hover:text-blue-500">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15.232 5.232l3.536 3.536M16.5 4.5l3 3L7.5 19.5H4.5v-3L16.5 4.5z" />
                  </svg>
                </button>
            </div>
          </td>

          <!-- タグ -->
          <td class="editable relative w-60 border-r border-b border-blue-300 text-center tag" data-field="tag">
            <!-- 表示用 -->
            <span class="cell-text block w-full py-2 px-4">
              <div class="tag-list flex flex-wrap gap-1 justify-center">
              </div>
            </span>
            <!-- 編集モード（初期は hidden） -->
            <div class="hidden edit-area w-full h-full">
              <div class="tag-edit-wrapper flex items-center flex-wrap gap-1 w-full h-full border border-blue-400 rounded px-2 py-1 min-h-[2.5rem]">
                <!-- 選択済みタグを表示するコンテナ -->
                <div class="current-tags flex flex-wrap items-center gap-1 w-full h-full"></div>
                <!-- 入力欄（タグの後ろに来る） -->
                <input type="text"
                       class="tag-input flex-grow min-w-[4rem] bg-transparent outline-none w-full h-full"
                       placeholder="タグを追加または選択"
                       list="tag-list-datalist">
              </div>
              <!-- 候補リスト -->
              <div class="tag-suggestions hidden absolute top-full left-0 right-0 mt-1 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded shadow max-h-40 overflow-y-auto z-10" id="tagSuggestions"></div>
            </div>
          </td>

          <!-- ステータス -->
          <td class="editable border-r border-b border-blue-300 py-2 px-4 text-center status" th:text="${item.status}" data-field="status">
            <select class="status-select">
                <option value="未着手" th:selected="${item.status == '未着手'}">未着手</option>
                <option value="進行中" th:selected="${item.status == '進行中'}">進行中</option>
                <option value="完了" th:selected="${item.status == '完了'}">完了</option>
            </select>
          </td>

          <!-- 優先度 -->
          <td class="editable border-r border-b border-blue-300 py-2 px-4 text-center priority" th:text="${item.priority}" data-field="priority">
            <select class="priority-select">
                <option value="高" th:selected="${item.priority == '高'}">高</option>
                <option value="中" th:selected="${item.priority == '中'}">中</option>
                <option value="低" th:selected="${item.priority == '低'}">低</option>
            </select>
          </td>

          <!-- 作成日 -->
          <td class="editable border-r border-b border-blue-300 py-2 px-4 text-gray-600 dark:text-white createdAt"
            th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd')}" data-field="createdAt">
          </td>

          <!-- 締切 -->
          <td class="editable border-r border-b border-blue-300 py-2 px-4 text-center deadline" data-field="deadline">
              <div th:text="${#temporals.format(item.deadline, 'yyyy-MM-dd')}"></div>
              <div class="text-xs text-gray-600 mt-1 dark:text-gray-400">
                  (あと
                  <span th:text="${item.deadline != null} ? ${T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), item.deadline)} : '期限未設定'"></span>日)
              </div>
          </td>


          <!-- 詳細 -->
          <td contenteditable="true" class="editable detail w-80 border-r border-b border-blue-300 py-2 px-4 text-left"
            th:text="${item.detail}" data-field="detail">
          </td>

          <!-- 操作 -->
          <td class="border-r border-b border-blue-300 py-2 px-4">
            <form th:action="@{/delete/{id}(id=${item.id})}" method="post" style="display:inline;">
              <button type="submit"
                class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-400 dark:bg-red-500 dark:hover:bg-red-600 dark:focus:ring-red-300 text-sm">
                削除
              </button>
            </form>
          </td>

        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
