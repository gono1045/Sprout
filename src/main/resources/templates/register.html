<!DOCTYPE html>
<html lang="ja" class="h-screen">
<head>
  <meta charset="UTF-8">
  <title>Sprout Register</title>
  <link rel="stylesheet" th:href="@{/css/output.css}">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

  <!-- 成功時のみ3秒後にトップへ -->
  <meta th:if="${successMessage}"
        http-equiv="refresh"
        content="3;url=/">

</head>

<body class="flex items-center justify-center min-h-screen p-6
             bg-gradient-to-br from-green-100 via-emerald-200 to-teal-200">

<div class="w-full max-w-sm
            bg-white/60 backdrop-blur-sm
            p-10 rounded-3xl
            shadow-lg text-center">

  <!-- タイトル -->
  <h1 class="text-4xl text-emerald-700 mb-8"
  style="font-family: 'Merriweather', serif;">
    Sprout
  </h1>

  <p class="text-emerald-600 text-sm mb-6">アカウント作成</p>

  <!-- 成功時はフォームを隠す -->
  <form th:unless="${successMessage}"
        th:action="@{/register}"
        th:object="${sproutUserForm}"
        method="post"
        class="space-y-4">

    <!-- ログインID -->
    <div class="text-left">
      <input type="text"
             th:field="*{loginId}"
             placeholder="Login ID"
             class="w-full px-4 py-3 rounded-xl bg-white border border-emerald-100
                    placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-300 transition"/>

      <p class="text-red-500 text-xs mt-1"
         th:if="${#fields.hasErrors('loginId')}"
         th:errors="*{loginId}"></p>
    </div>

    <!-- メール -->
    <div class="text-left">
      <input type="email"
             th:field="*{email}"
             placeholder="Email"
             class="w-full px-4 py-3 rounded-xl bg-white border border-emerald-100
                    placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-300 transition"/>

      <p class="text-red-500 text-xs mt-1"
         th:errors="*{email}"></p>
    </div>

    <!-- パスワード -->
    <div class="text-left">
      <input type="password"
             th:field="*{password}"
             placeholder="Password"
             class="w-full px-4 py-3 rounded-xl bg-white border border-emerald-100
                    placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-300 transition"/>

      <p class="text-red-500 text-xs mt-1"
         th:errors="*{password}"></p>
    </div>

    <!-- パスワード確認 -->
    <div class="text-left">
      <input type="password"
             th:field="*{confirmPassword}"
             placeholder="Confirm Password"
             class="w-full px-4 py-3 rounded-xl bg-white border border-emerald-100
                    placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-300 transition"/>

      <p class="text-red-500 text-xs mt-1"
         th:errors="*{confirmPassword}"></p>
    </div>

    <!-- 登録ボタン -->
    <button type="submit"
            class="w-full bg-emerald-400 text-white py-3 rounded-xl hover:bg-emerald-500
                   transition font-semibold shadow-sm">
      Create Account
    </button>

  </form>

  <!-- 区切り線（成功時は非表示） -->
  <div th:unless="${successMessage}" class="flex items-center my-6">
    <div class="flex-grow border-t border-emerald-100"></div>
    <span class="px-3 text-emerald-300 text-sm">OR</span>
    <div class="flex-grow border-t border-emerald-100"></div>
  </div>

  <!-- ログインリンク（成功時は非表示） -->
  <a th:unless="${successMessage}"
     th:href="@{/login}"
     class="text-sm text-emerald-600 hover:underline">
    既にアカウントをお持ちの方はこちら
  </a>

  <!-- 成功メッセージ（中央表示） -->
  <div th:if="${successMessage}"
       class="p-4 rounded-xl bg-emerald-100 text-emerald-700 text-sm">
    <span th:text="${successMessage}"></span>
    <p class="text-xs text-emerald-600 mt-2">
      数秒後にSproutへ移動します...
    </p>
  </div>

</div>

</body>
</html>
