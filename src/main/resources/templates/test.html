<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test</title> <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script> <!-- Flatpickr CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        table {
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid black;
            padding: 10px;
        }

        .deadline {
            cursor: pointer;
            background-color: #f0f8ff;
        }

        .deadline:hover {
            background-color: #e6f3ff;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th>deadline</th>
        </tr>
        <tr>
            <td class="deadline">2025-11-15</td>
        </tr>
        <tr>
            <td class="deadline">2025-12-01</td>
        </tr>
        <tr>
            <td class="deadline">2025-11-30</td>
        </tr>
    </table>
</body>
<script>
$(document).ready(function () {
    function attachDeadlineClick() {
        $(".deadline").off("click").on("click", function () {
            const cell = $(this);
            // 既にinputに変換済みの場合は何もしない
            if (cell.find("input").length > 0) {
                return;
            }
            // 現在の値を取得（改行前の日付部分のみ）
            const currentValue = cell.text().split("\n")[0] || cell.text();
            // セルのサイズ・スタイルを取得
            const cellWidth = cell.width();
            const cellHeight = cell.height();
            // inputを作成してセルに挿入
            const input = $(
                '<input type="text" style="width:100%; height: 100%; box-sizing: border-box; border:none; padding: 0; margin: 0; outline: none; font-size: inherit; text-align: center; background:transparent;">'
            );
            input.val(currentValue);
            cell.html(input);
            // inputのサイズを厳密にセルに合わせる
            input.css({
                width: cellWidth + "px",
                height: cellHeight + "px",
                minWidth: cellWidth + "px",
                minHeight: cellHeight + "px",
                maxWidth: cellWidth + "px",
                maxHeight: cellHeight + "px",
            });
            // inputにフォーカス
            input.focus();
            // Flatpickrでカレンダー機能を追加
            const fp = flatpickr(input[0], {
                dateFormat: "Y/m/d",
                defaultDate: currentValue || new Date(),
                closeOnSelect: false,
                allowInput: true,
                onReady: function (selectedDates, dateStr, instance) {
                    setTimeout(() => instance.open(), 0); // 編集開始時にカレンダーを自動で開く
                },
            });
            // 日数計算関数
            function calculateAndDisplay(dateStr) {
                if (dateStr) {
                    const selectedDate = new Date(dateStr);
                    if (!isNaN(selectedDate.getTime())) {
                        const today = new Date(2025, 9, 30); // 2025-10-30
                        today.setHours(0, 0, 0, 0);
                        selectedDate.setHours(0, 0, 0, 0);
                        const diffTime = selectedDate - today;
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        let displayText = dateStr;
                        if (diffDays > 0) {
                            displayText += "<br>(あと" + diffDays + "日)";
                        } else if (diffDays === 0) {
                            displayText += "<br>(今日)";
                        } else {
                            displayText += "<br>(" + Math.abs(diffDays) + "日経過)";
                        }
                        cell.html(displayText);
                    } else {
                        cell.text(dateStr); // 無効な日付の場合はそのまま表示
                    }
                } else {
                    cell.text(""); // 空の場合
                }
                attachDeadlineClick(); // 再度クリックイベントを付与
            }
            // blurイベント（フォーカスが外れた時）
            input.on("blur", function () {
                const value = input.val();
                fp.destroy();
                calculateAndDisplay(value);
            });
            // Enterキーで確定
            input.on("keypress", function (e) {
                if (e.which === 13) {
                    input.blur();
                }
            });
            // Escキーでキャンセル
            input.on("keydown", function (e) {
                if (e.which === 27) {
                    fp.destroy();
                    cell.html(currentValue.includes("\n") ? currentValue.replace("\n", "<br>") : currentValue);
                    attachDeadlineClick();
                }
            });
        });
    }
    attachDeadlineClick();
});
</script>
</html>
