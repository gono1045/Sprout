<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 ページが見つかりません | Sprout</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/output.css}">
  <link rel="icon" type="image/png" th:href="@{/img/favicon.ico}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --forest: #1B4332;
      --moss:   #3E7A52;
      --moss-2: #5BA178;
      --paper:  #F4F1E9;
      --line:   #E6DFCD;
      --ink:    #1B2A20;
      --ink-2:  #4A5E4A;
      --ink-3:  #8E9A8E;
      --card:   #FFFFFF;
    }
    body {
      font-family: system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hdr {
      position: sticky; top: 0; z-index: 100;
      height: 56px; padding: 0 24px;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center;
    }
    .hdr-logo {
      text-decoration: none;
      font-family: 'Merriweather', serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--forest);
      letter-spacing: .02em;
    }
    .error-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
    }
    .error-main::before {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      opacity: .35;
      background-image: radial-gradient(circle, var(--moss-2) 0.55px, transparent 1px);
      background-size: 28px 28px;
    }
    .error-panel {
      position: relative; z-index: 1;
      text-align: center;
      max-width: 520px;
      animation: fadeIn .45s ease;
    }
    .error-illust {
      margin: 0 auto 36px;
      width: 180px; height: 180px;
      display: flex; align-items: center; justify-content: center;
    }
    .error-illust img { width: 100%; height: 100%; object-fit: contain; }
    .error-code-wrap {
      display: inline-block;
      margin-bottom: 20px;
    }
    .error-code {
      font-family: 'Merriweather', serif;
      font-weight: 900;
      font-size: 96px;
      line-height: 1;
      letter-spacing: -.02em;
      color: var(--forest);
    }
    .error-code-line {
      display: block;
      margin: 4px auto 0;
      height: 3px;
      width: 80px;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, var(--moss-2), transparent);
    }
    .error-title {
      font-family: 'Merriweather', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--forest);
      margin-bottom: 12px;
      line-height: 1.35;
    }
    .error-desc {
      font-size: 14px;
      color: var(--ink-3);
      line-height: 1.75;
      max-width: 480px;
      margin: 0 auto 36px;
    }
    .error-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 24px;
      height: 44px;
      background: linear-gradient(135deg, var(--forest), var(--moss));
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      text-decoration: none;
      letter-spacing: .02em;
      cursor: pointer;
      transition: opacity .15s, box-shadow .15s;
      box-shadow: 0 2px 10px rgba(27,67,50,.28);
    }
    .btn-primary:hover { opacity: .9; box-shadow: 0 4px 16px rgba(27,67,50,.35); }
    .error-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--line);
      text-align: center;
      font-size: 12px;
      color: var(--ink-3);
    }
  </style>
</head>
<body>
  <header class="hdr">
    <a class="hdr-logo" th:href="@{/}" href="/">Sprout</a>
  </header>

  <main class="error-main">
    <div class="error-panel">

      <div class="error-illust">
        <img th:src="@{/img/tired_sprout.png}" src="/img/tired_sprout.png" alt=""/>
      </div>

      <div class="error-code-wrap">
        <div class="error-code">404</div>
        <span class="error-code-line"></span>
      </div>

      <h1 class="error-title">ページが見つかりません</h1>
      <p class="error-desc">
        お探しのページは存在しないか、移動した可能性があります。<br>
        URLをご確認のうえ、再度お試しください。
      </p>

      <div class="error-actions">
        <a class="btn-primary" th:href="@{/}" href="/">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          ホームへ戻る
        </a>
      </div>

    </div>
  </main>

  <footer class="error-footer">Sprout — Personal Task Management</footer>
</body>
</html>
