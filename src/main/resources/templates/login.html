<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Sprout Login</title>
  <link rel="stylesheet" th:href="@{/css/output.css}">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #1B4332;
      --moss:   #3E7A52;
      --moss-2: #5BA178;
      --paper:  #F4F1E9;
      --line:   #E6DFCD;
      --ink:    #1B2A20;
      --ink-2:  #4A5E4A;
      --ink-3:  #8E9A8E;
      --card:   #FFFFFF;
    }

    body {
      background-color: var(--paper);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--line) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 48px 40px 40px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(27, 67, 50, 0.08);
    }

    .login-logo {
      font-family: 'Merriweather', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--forest);
      margin-bottom: 32px;
      display: block;
    }

    .login-error {
      color: #C85A5A;
      font-size: 14px;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      text-align: left;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .login-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card);
      color: var(--ink);
      font-size: 15px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      box-sizing: border-box;
    }

    .login-input::placeholder {
      color: var(--ink-3);
    }

    .login-input:focus {
      border-color: var(--moss-2);
      box-shadow: 0 0 0 3px rgba(91, 161, 120, 0.15);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, var(--forest), var(--moss));
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity .15s, box-shadow .15s;
      box-shadow: 0 2px 10px rgba(27, 67, 50, 0.28);
      margin-top: 4px;
    }

    .btn-primary:hover {
      opacity: .9;
      box-shadow: 0 4px 16px rgba(27, 67, 50, 0.35);
    }

    .login-forgot {
      font-size: 13px;
      color: var(--ink-3);
      margin-top: 28px;
    }

    .login-divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      gap: 12px;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--line);
    }

    .login-divider span {
      font-size: 12px;
      color: var(--ink-3);
    }

    .login-register {
      font-size: 13px;
      color: var(--moss);
      text-decoration: none;
      font-weight: 500;
    }

    .login-register:hover {
      color: var(--forest);
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <span class="login-logo">Sprout</span>

    <div th:if="${withdrawSuccess}" class="login-error" style="background:#f0fdf4;border-color:#bbf7d0;color:#166534;">
      退会が完了しました。ご利用ありがとうございました。
    </div>

    <div th:if="${resetSuccess}" class="login-error" style="background:#f0fdf4;border-color:#bbf7d0;color:#166534;">
      パスワードを変更しました。新しいパスワードでログインしてください。
    </div>

    <div th:if="${loginError}" class="login-error">
      ログインIDまたはパスワードが違います
    </div>

    <form th:action="@{/login}" method="post" class="login-form">
      <input type="text" name="username" placeholder="Login ID or Email" required
             class="login-input"/>
      <input type="password" name="password" placeholder="Password" required
             class="login-input"/>
      <button type="submit" class="btn-primary">
        Log in
      </button>
    </form>

    <a th:href="@{/password-reset/request}" class="login-forgot" style="text-decoration:none;cursor:pointer;">
      パスワードを忘れた方はこちら
    </a>

    <div class="login-divider"><span>OR</span></div>

    <a th:href="@{/register}" class="login-register">
      アカウント作成
    </a>
  </div>

</body>
</html>
