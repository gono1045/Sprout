<!DOCTYPE html>
<html lang="ja" class="h-screen">
<head>
  <meta charset="UTF-8">
  <title>Sprout Login</title>
  <link rel="stylesheet" th:href="@{/css/output.css}">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="flex items-center justify-center min-h-screen p-6
             bg-gradient-to-br from-green-100 via-emerald-200 to-teal-200">

  <div class="w-full max-w-sm
              bg-white/60 backdrop-blur-sm
              p-10 rounded-3xl
              shadow-lg text-center">
    <h1 class="text-4xl text-emerald-700 mb-10"
    style="font-family: 'Merriweather', serif;">
      Sprout
    </h1>

    <div th:if="${loginError}" class="text-red-500 text-sm mb-4">
      ログインIDまたはパスワードが違います
    </div>

    <form th:action="@{/login}" method="post" class="space-y-5">
      <input type="text" name="username" placeholder="Login ID or Email" required
             class="w-full px-4 py-3 rounded-xl bg-white border border-emerald-100 placeholder-gray-400
                    focus:outline-none focus:ring-2 focus:ring-emerald-300 transition"/>
      <input type="password" name="password" placeholder="Password" required
             class="w-full px-4 py-3 rounded-xl bg-white border border-emerald-100 placeholder-gray-400
                    focus:outline-none focus:ring-2 focus:ring-emerald-300 transition"/>
      <button type="submit"
              class="w-full bg-emerald-400 text-white py-3 rounded-xl hover:bg-emerald-500
                     transition font-semibold shadow-sm">
        Log in
      </button>
    </form>

    <p class="text-sm text-gray-500 mt-8">パスワードを忘れましたか？</p>

    <div class="flex items-center my-6">
      <div class="flex-grow border-t border-emerald-100"></div>
      <span class="px-3 text-emerald-300 text-sm">OR</span>
      <div class="flex-grow border-t border-emerald-100"></div>
    </div>

    <a th:href="@{/register}"
       class="text-sm text-emerald-400 hover:text-emerald-500 hover:underline">
      アカウント作成
    </a>
  </div>

</body>
</html>
