<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プロフィール — Sprout</title>
  <link rel="stylesheet" th:href="@{/css/output.css}">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #1B4332; --moss: #3E7A52; --moss-2: #5BA178;
      --paper: #F4F1E9; --line: #E6DFCD; --line-soft: #EFE9D7;
      --ink: #1B2A20; --ink-2: #4A5E4A; --ink-3: #8E9A8E; --card: #FFFFFF;
      --ember: #C85A28;
    }
    body { background: var(--paper); color: var(--ink); min-height: 100vh; }
    .page-header {
      height: 56px; padding: 0 24px; background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 50;
    }
    .logo { font-family: 'Merriweather', serif; font-size: 20px; font-weight: 700; color: var(--forest); text-decoration: none; }
    .back-link { margin-left: auto; font-size: 13px; color: var(--moss); text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .page-body { max-width: 520px; margin: 48px auto; padding: 0 24px; }
    .page-title { font-family: 'Merriweather', serif; font-size: 22px; font-weight: 700; color: var(--forest); margin-bottom: 28px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 32px; }
    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 20px; }
    .field-label { font-size: 11.5px; font-weight: 600; letter-spacing: .055em; text-transform: uppercase; color: var(--ink-2); }
    .field-input {
      height: 44px; padding: 0 14px; border: 1.5px solid var(--line); border-radius: 10px;
      background: #FAF7EF; color: var(--ink); font-size: 14px; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field-input:focus { border-color: var(--moss-2); box-shadow: 0 0 0 3px rgba(91,161,120,.14); background: var(--card); }
    .field-error { font-size: 12px; color: var(--ember); margin-top: 2px; }
    .alert-success {
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px;
      padding: 12px 16px; font-size: 13px; color: #166534; margin-bottom: 20px;
    }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center;
      height: 44px; padding: 0 28px; border-radius: 10px; border: none; cursor: pointer;
      background: linear-gradient(135deg, var(--forest), var(--moss));
      color: #fff; font-size: 14px; font-weight: 600;
      box-shadow: 0 2px 10px rgba(27,67,50,.25); transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .9; }
  </style>
</head>
<body>
  <header class="page-header">
    <a th:href="@{/}" class="logo">Sprout</a>
    <a th:href="@{/}" class="back-link">← ホームへ戻る</a>
  </header>

  <div class="page-body">
    <h1 class="page-title">プロフィール</h1>

    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>

    <div class="card">
      <form th:action="@{/account/profile}" th:object="${sproutProfileForm}" method="post">
        <div class="field">
          <label class="field-label" for="loginId">ユーザー名</label>
          <input type="text" id="loginId" th:field="*{loginId}" class="field-input"
                 autocomplete="username" placeholder="ユーザー名を入力"/>
          <div th:if="${#fields.hasErrors('loginId')}" th:errors="*{loginId}" class="field-error"></div>
        </div>
        <button type="submit" class="btn-primary">保存する</button>
      </form>
    </div>
  </div>
</body>
</html>
