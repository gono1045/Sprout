<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アカウント設定 — Sprout</title>
  <link rel="stylesheet" th:href="@{/css/output.css}">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #1B4332; --moss: #3E7A52; --moss-2: #5BA178;
      --paper: #F4F1E9; --line: #E6DFCD;
      --ink: #1B2A20; --ink-2: #4A5E4A; --ink-3: #8E9A8E; --card: #FFFFFF;
      --ember: #C85A28;
    }
    body { background: var(--paper); color: var(--ink); min-height: 100vh; }
    .page-header {
      height: 56px; padding: 0 24px; background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--line);
      display: flex; align-items: center; position: sticky; top: 0; z-index: 50;
    }
    .logo { font-family: 'Merriweather', serif; font-size: 20px; font-weight: 700; color: var(--forest); text-decoration: none; }
    .back-link { margin-left: auto; font-size: 13px; color: var(--moss); text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .page-body { max-width: 520px; margin: 48px auto; padding: 0 24px; }
    .page-title { font-family: 'Merriweather', serif; font-size: 22px; font-weight: 700; color: var(--forest); margin-bottom: 28px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 32px; margin-bottom: 20px; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--ink-2); margin-bottom: 12px; letter-spacing: .03em; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--line); }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 13px; color: var(--ink-3); }
    .info-value { font-size: 13px; font-weight: 600; color: var(--ink); }
    .danger-card { background: #fff5f5; border: 1px solid #fecaca; border-radius: 16px; padding: 32px; }
    .danger-title { font-size: 16px; font-weight: 700; color: #991b1b; margin-bottom: 8px; }
    .danger-desc { font-size: 13px; color: #7f1d1d; line-height: 1.6; margin-bottom: 20px; }
    .btn-danger {
      display: inline-flex; align-items: center; height: 40px; padding: 0 20px;
      border-radius: 10px; border: 1.5px solid #fca5a5; background: #fef2f2;
      color: #b91c1c; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .12s;
    }
    .btn-danger:hover { background: #fee2e2; }

    /* 退会確認モーダル */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,.5); align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 16px;
      padding: 32px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,.2);
    }
    .modal-title { font-family: 'Merriweather', serif; font-size: 18px; font-weight: 700; color: #991b1b; margin-bottom: 12px; }
    .modal-desc { font-size: 13px; color: var(--ink-2); line-height: 1.65; margin-bottom: 20px; }
    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 20px; }
    .field-label { font-size: 11.5px; font-weight: 600; letter-spacing: .055em; text-transform: uppercase; color: var(--ink-2); }
    .field-input {
      height: 44px; padding: 0 14px; border: 1.5px solid var(--line); border-radius: 10px;
      background: #FAF7EF; color: var(--ink); font-size: 14px; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field-input:focus { border-color: #fca5a5; box-shadow: 0 0 0 3px rgba(220,38,38,.12); background: var(--card); }
    .field-error { font-size: 12px; color: var(--ember); margin-top: 2px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; }
    .btn-cancel {
      display: inline-flex; align-items: center; height: 40px; padding: 0 20px;
      border-radius: 10px; border: 1.5px solid var(--line); background: var(--card);
      color: var(--ink-2); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .12s;
    }
    .btn-cancel:hover { background: #f0f5eb; }
    .btn-withdraw {
      display: inline-flex; align-items: center; height: 40px; padding: 0 20px;
      border-radius: 10px; border: none; background: #dc2626;
      color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn-withdraw:hover { opacity: .88; }
  </style>
</head>
<body>
  <header class="page-header">
    <a th:href="@{/}" class="logo">Sprout</a>
    <a th:href="@{/}" class="back-link">← ホームへ戻る</a>
  </header>

  <div class="page-body">
    <h1 class="page-title">アカウント設定</h1>

    <!-- アカウント情報 -->
    <div class="card">
      <p class="section-title">アカウント情報</p>
      <div class="info-row">
        <span class="info-label">ユーザー名</span>
        <span class="info-value" th:text="${loginId}"></span>
      </div>
      <div class="info-row">
        <span class="info-label">メールアドレス</span>
        <span class="info-value" th:text="${email}"></span>
      </div>
    </div>

    <!-- 退会エリア -->
    <div class="danger-card">
      <p class="danger-title">アカウント退会</p>
      <p class="danger-desc">
        退会するとアカウントが無効になり、ログインできなくなります。<br>
        この操作は取り消せません。
      </p>
      <button type="button" class="btn-danger" id="openWithdrawModal">退会する</button>
    </div>
  </div>

  <!-- 退会確認モーダル -->
  <div class="modal-overlay" id="withdrawModalOverlay" th:classappend="${showWithdrawModal} ? 'active' : ''">
    <div class="modal-card">
      <p class="modal-title">本当に退会しますか？</p>
      <p class="modal-desc">
        退会するとすべてのデータにアクセスできなくなります。<br>
        確認のためパスワードを入力してください。
      </p>
      <form th:action="@{/account/withdraw}" th:object="${sproutWithdrawForm}" method="post">
        <div class="field">
          <label class="field-label" for="password">パスワード</label>
          <input type="password" id="password" th:field="*{password}"
                 class="field-input" autocomplete="current-password" placeholder="パスワードを入力"/>
          <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" id="closeWithdrawModal">キャンセル</button>
          <button type="submit" class="btn-withdraw">退会する</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    var overlay = document.getElementById('withdrawModalOverlay');
    document.getElementById('openWithdrawModal').addEventListener('click', function() {
      overlay.classList.add('active');
    });
    document.getElementById('closeWithdrawModal').addEventListener('click', function() {
      overlay.classList.remove('active');
    });
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) overlay.classList.remove('active');
    });
  </script>
</body>
</html>
